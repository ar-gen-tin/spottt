<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Spottt — Discman</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:transparent;display:flex;justify-content:center;align-items:flex-start;
  min-height:100vh;-webkit-app-region:drag;overflow:hidden}
button{-webkit-app-region:no-drag}

/* Outer wrapper scales everything uniformly */
.scale-wrap{
  transform:scale(0.7);
  transform-origin:top center;
  margin-top:0;
}

.container{position:relative;width:420px;height:460px}
.device-svg{position:absolute;top:0;left:0;width:100%;height:100%}

/* LCD overlay — matches SVG screen at ORIGINAL scale (scaling handled by wrapper) */
.lcd-layer{
  position:absolute;
  top:80px;left:42px;
  width:336px;height:250px;
  overflow:hidden;
  display:flex;flex-direction:column;
  padding:8px 10px 6px;
  z-index:5;
  font-family:'Courier New',monospace;
}

.lcd-head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:4px}
.lcd-track-num{font-size:18px;font-weight:bold;color:#ff9c20;text-shadow:0 0 8px rgba(255,156,32,0.4)}
.lcd-time{font-size:13px;color:#c87000}
.lcd-indicators{font-size:7px;color:#c87000;opacity:0.5;letter-spacing:1px}

.lcd-track{font-size:11px;color:#e08800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  text-shadow:0 0 4px rgba(224,136,0,0.3)}
.lcd-artist{font-size:9px;color:#8a5500;margin-bottom:4px}

.lcd-art{
  flex:1;
  display:block;
  font-family:'Menlo','Courier New',monospace;
  font-size:4.8px;line-height:1.12;
  color:#d08000;
  white-space:pre;letter-spacing:0px;
  overflow:hidden;
  text-align:center;
  padding-top:2px;
}
.lcd-art span{white-space:pre}
/* beat pulse disabled */

.lcd-progress{margin-top:4px}
.lcd-bar{height:2px;background:rgba(200,112,0,0.12);border-radius:1px}
.lcd-bar-fill{height:100%;width:0%;background:#c87000;border-radius:1px;transition:width 0.5s linear;
  box-shadow:0 0 4px rgba(200,112,0,0.3)}
.lcd-times{display:flex;justify-content:space-between;font-size:8px;color:#8a5500;margin-top:2px}

@keyframes meterPulse{0%,100%{opacity:0.3}50%{opacity:0.9}}
.meter-bar{animation:meterPulse 0.8s ease-in-out infinite}

.idle{font-size:14px;color:#c87000;text-align:center;opacity:0.3;
  animation:ib 2.5s ease-in-out infinite}
@keyframes ib{0%,100%{opacity:0.3}50%{opacity:0.1}}

.btn-hit{position:absolute;z-index:10;opacity:0;cursor:pointer;border:none;background:none}
</style>
</head><body>

<div class="scale-wrap">
<div class="container">
<svg class="device-svg" viewBox="0 0 420 460" xmlns="http://www.w3.org/2000/svg">
<defs>
  <filter id="pTex"><feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="4" seed="2"/>
    <feColorMatrix type="saturate" values="0"/><feBlend in="SourceGraphic" mode="multiply"/>
    <feComposite in2="SourceGraphic" operator="in"/></filter>
  <filter id="drop"><feDropShadow dx="0" dy="6" stdDeviation="12" flood-opacity="0.6"/></filter>
  <filter id="inset"><feFlood flood-color="#000" flood-opacity="0.65"/>
    <feComposite in2="SourceGraphic" operator="out"/><feGaussianBlur stdDeviation="4"/>
    <feComposite in2="SourceGraphic" operator="atop"/></filter>
  <filter id="shIn"><feFlood flood-color="#000" flood-opacity="0.3"/>
    <feComposite in2="SourceGraphic" operator="out"/><feGaussianBlur stdDeviation="1.2"/>
    <feComposite in2="SourceGraphic" operator="atop"/></filter>
  <filter id="btnB"><feDropShadow dx="0" dy="1.2" stdDeviation="0.6" flood-opacity="0.5"/></filter>
  <filter id="glow"><feGaussianBlur stdDeviation="2" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  <linearGradient id="bG" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#282828"/><stop offset="3%" stop-color="#1c1c1c"/>
    <stop offset="50%" stop-color="#141414"/><stop offset="97%" stop-color="#181818"/>
    <stop offset="100%" stop-color="#101010"/></linearGradient>
  <linearGradient id="eL" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="rgba(255,255,255,0.12)"/>
    <stop offset="3%" stop-color="rgba(255,255,255,0.02)"/>
    <stop offset="97%" stop-color="rgba(0,0,0,0.02)"/>
    <stop offset="100%" stop-color="rgba(0,0,0,0.1)"/></linearGradient>
  <linearGradient id="amBg" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#1a0e00"/><stop offset="100%" stop-color="#0d0700"/></linearGradient>
  <radialGradient id="scr" cx=".4" cy=".4" r=".6">
    <stop offset="0%" stop-color="#555"/><stop offset="40%" stop-color="#333"/>
    <stop offset="100%" stop-color="#111"/></radialGradient>
  <linearGradient id="chr" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#888"/><stop offset="30%" stop-color="#ccc"/>
    <stop offset="50%" stop-color="#666"/><stop offset="80%" stop-color="#999"/>
    <stop offset="100%" stop-color="#555"/></linearGradient>
  <radialGradient id="gJack" cx=".5" cy=".4">
    <stop offset="0%" stop-color="#5b5"/><stop offset="60%" stop-color="#292"/>
    <stop offset="100%" stop-color="#161"/></radialGradient>
  <linearGradient id="tBtn" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#222"/><stop offset="100%" stop-color="#141414"/></linearGradient>
  <linearGradient id="knob" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#ddd"/><stop offset="15%" stop-color="#bbb"/>
    <stop offset="50%" stop-color="#999"/><stop offset="85%" stop-color="#bbb"/>
    <stop offset="100%" stop-color="#ccc"/></linearGradient>
</defs>

<script>
const API='http://127.0.0.1:18899';
let curId=null,beatTimer=null;
const $=id=>document.getElementById(id);
function fmt(ms){const s=Math.floor(ms/1000),m=Math.floor(s/60);return`${String(m).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`}

async function poll(){
  try{
    const r=await fetch(API+'/state');if(!r.ok)return;const d=await r.json();
    if(!d.track_id){
      $('trackName').textContent='';$('trackArtist').textContent='';
      $('trackNum').textContent='--';$('lcdTime').textContent='--:--';
      $('progressFill').style.width='0%';$('timePos').textContent='00:00';$('timeDur').textContent='00:00';
      $('artDisplay').innerHTML='<div class="idle">INSERT DISC</div>';return;
    }
    $('trackName').textContent=d.name||'';$('trackArtist').textContent=d.artist||'';
    $('trackNum').textContent='01';
    $('lcdTime').textContent=fmt(d.progress_ms);
    $('progressFill').style.width=(d.duration_ms>0?(d.progress_ms/d.duration_ms)*100:0)+'%';
    $('timePos').textContent=fmt(d.progress_ms);$('timeDur').textContent=fmt(d.duration_ms);
    $('modeIndicators').textContent=d.is_playing?'▶ PLAY':'⏸ PAUSE';
    if(d.track_id!==curId){curId=d.track_id;fetchArt();
}
  }catch(e){}}

async function fetchArt(){try{const r=await fetch(API+'/art');if(!r.ok)return;
  const d=await r.json();if(d.html)$('artDisplay').innerHTML=d.html}catch(e){}}

$('btnStyle')?.addEventListener('click',async()=>{try{await fetch(API+'/action/next_style',{method:'POST'});curId=null}catch(e){}});
$('btnPlay')?.addEventListener('click',async()=>{try{await fetch(API+'/action/play_pause',{method:'POST'})}catch(e){}});
$('btnPrev')?.addEventListener('click',async()=>{try{await fetch(API+'/action/prev_track',{method:'POST'})}catch(e){}});
$('btnNext')?.addEventListener('click',async()=>{try{await fetch(API+'/action/next_track',{method:'POST'})}catch(e){}});

setInterval(poll,1000);poll();
</script>
